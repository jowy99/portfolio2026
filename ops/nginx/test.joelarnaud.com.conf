server {
  listen 80;
  listen [::]:80;
  server_name test.joelarnaud.com;

  # Astro static output
  root /var/www/portfolio2026/dist;
  index index.html;

  # ACME challenge for Let's Encrypt (certbot --webroot)
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  # Static site routing (no SPA fallback required)
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  # Cache immutable build assets
  location ~* ^/_astro/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # Light caching for public static assets
  location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|webp|avif|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  # HTML should be revalidated
  location ~* \.html?$ {
    expires -1;
    add_header Cache-Control "no-cache";
  }
}
